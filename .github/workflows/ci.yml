name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "quarkify.mjs"
      - "test/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "quarkify.mjs"
      - "test/**"

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Node.js 22
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check CLI syntax
        run: node --check quarkify.mjs
